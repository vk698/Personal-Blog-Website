<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>iBlog – Contact Us</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="css/utils.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/contact.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%);
      color: #2c3e4e;
      scroll-behavior: smooth;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(230,126,34,0.08) 0%, rgba(255,245,230,0) 70%);
      pointer-events: none;
      z-index: -2;
      animation: drift 18s infinite alternate;
    }
    @keyframes drift {
      0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
      100% { transform: scale(1.2) translate(2%, 1%); opacity: 0.9; }
    }
    .max-width-1 { max-width: 1280px; }
    .m-auto { margin-left: auto; margin-right: auto; }
    .navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 2rem;
      background: rgba(255, 250, 245, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 80px;
      margin-top: 1.2rem;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      border: 1px solid rgba(255,245,230,0.8);
    }
    .navigation:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-left ul {
      display: flex;
      gap: 1.8rem;
      list-style: none;
    }
    .nav-left ul li a {
      text-decoration: none;
      color: #2c3e4e;
      font-weight: 600;
      transition: 0.2s;
      position: relative;
    }
    .nav-left ul li a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0;
      height: 2.5px;
      background: linear-gradient(90deg, #e67e22, #f39c12);
      transition: width 0.25s ease;
      border-radius: 3px;
    }
    .nav-left ul li a:hover::after {
      width: 100%;
    }
    .nav-left ul li a:hover {
      color: #e67e22;
    }
    .contact-content {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 2rem;
      margin: 2rem auto;
      max-width: 800px;
      border: 1px solid rgba(230,126,34,0.15);
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .contact-content h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      border-left: 6px solid #e67e22;
      padding-left: 1rem;
    }
    .form-box {
      margin-bottom: 1.2rem;
    }
    .form-box input, .form-box textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ffe0cc;
      border-radius: 24px;
      font-family: inherit;
      font-size: 1rem;
      background: white;
      transition: 0.2s;
    }
    .form-box input:focus, .form-box textarea:focus {
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
      outline: none;
    }
    .form-box button {
      background: linear-gradient(95deg, #e67e22, #f39c12);
      border: none;
      color: white;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .form-box button:hover {
      transform: scale(0.98);
      box-shadow: 0 6px 14px rgba(230,126,34,0.3);
    }
    .footer {
      text-align: center;
      padding: 2rem;
      background: #2c3e4e;
      color: #ecf0f1;
      margin-top: 2rem;
      border-radius: 3rem 3rem 0 0;
      font-size: 0.9rem;
    }
    .footer a {
      color: #f39c12;
      text-decoration: none;
    }
    .floating-btn {
      position: fixed;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 999;
      text-decoration: none;
      transition: 0.3s;
    }
    .floating-btn:hover {
      transform: scale(1.1);
    }
    .whatsapp {
      bottom: 20px;
      background: #25D366;
    }
    .call {
      bottom: 90px;
      background: #007bff;
    }
    #ai-btn {
      position: fixed;
      bottom: 28px;
      left: 28px;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 30% 20%, #e67e22, #b64900);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(230,126,34,0.4);
      z-index: 1000;
      border: 2px solid white;
      transition: all 0.25s;
    }
    #ai-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 15px 28px rgba(230,126,34,0.6);
    }
    #ai-box {
      position: fixed;
      bottom: 100px;
      left: 28px;
      width: 380px;
      max-width: calc(100vw - 50px);
      background: rgba(255, 255, 250, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1001;
      font-family: 'Inter', sans-serif;
      animation: fadeScale 0.2s ease;
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    #ai-box::before {
      content: "🐱 Kittu AI Assistant";
      padding: 14px 20px;
      background: linear-gradient(95deg, #e67e22, #f39c12);
      color: white;
      font-weight: 700;
      display: block;
    }
    #chat {
      height: 360px;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fffcf8;
    }
    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: slideMsg 0.2s ease;
    }
    @keyframes slideMsg {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; }
    .message.ai { align-self: flex-start; }
    .bubble {
      padding: 10px 16px;
      border-radius: 26px;
      font-size: 0.9rem;
      background: white;
      border: 1px solid #f0e0d2;
    }
    .user .bubble {
      background: #e67e22;
      color: white;
      border: none;
      border-bottom-right-radius: 6px;
    }
    .ai .bubble {
      background: #ffffff;
      border-bottom-left-radius: 6px;
    }
    .timestamp {
      font-size: 0.65rem;
      color: #b0a89c;
      margin: 4px 12px 0;
    }
    .input-wrapper {
      display: flex;
      border-top: 1px solid #f0dfcf;
      background: white;
    }
    #ai-box input {
      flex: 1;
      border: none;
      padding: 15px 16px;
      outline: none;
      background: #fffaf5;
    }
    #ai-box button {
      border: none;
      background: #e67e22;
      color: white;
      font-weight: 700;
      padding: 0 24px;
      cursor: pointer;
    }
    #ai-box button:hover {
      background: #d35400;
    }
    .typing span {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #e67e22;
      border-radius: 50%;
      margin: 0 2px;
      animation: wave 1.2s infinite;
    }
    @keyframes wave {
      0%,60%,100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
    @media (max-width: 700px) {
      .navigation { flex-direction: column; border-radius: 2rem; padding: 1rem; }
      .contact-content { margin: 1rem; padding: 1.5rem; }
      #ai-box { left: 16px; width: 300px; bottom: 88px; }
      #ai-btn { left: 16px; bottom: 18px; width: 52px; height: 52px; font-size: 28px; }
      .floating-btn { right: 12px; width: 48px; height: 48px; font-size: 20px; }
      .call { bottom: 80px; }
      .whatsapp { bottom: 20px; }
    }
  </style>
</head>
<body>

<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><span><img src="img/logo.png" width="94px" alt="logo" /></span></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="./">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>
</nav>

<div class="max-width-1 m-auto"><hr style="opacity:0.3" /></div>

<div class="contact-content font1 max-width-1 m-auto">
  <div class="max-width-1 m-auto mx-1">
    <h2><i class="fas fa-envelope-open-text"></i> Feel Free to Contact Us</h2>
    <form id="contact-form" class="contact-form">
      <div class="form-box">
        <input type="text" name="name" placeholder="Enter your name" required />
      </div>
      <div class="form-box">
        <input type="email" name="email" placeholder="Enter your email Id" required />
      </div>
      <div class="form-box">
        <input type="text" name="phone" placeholder="Enter your phone number" required />
      </div>
      <div class="form-box">
        <textarea name="message" cols="30" rows="8" placeholder="Enter your message" required></textarea>
      </div>
      <div class="form-box">
        <button class="btn" type="submit"><i class="fas fa-paper-plane"></i> Send Message</button>
      </div>
    </form>
  </div>
</div>

<div class="footer">
  <p>Copyright &copy; iBlog.com &nbsp;|&nbsp; <a href="./">Vector Credits: Vecteezy</a></p>
</div>

<a href="https://wa.me/918789297252" class="floating-btn whatsapp">
  <i class="fa-brands fa-whatsapp"></i>
</a>
<a href="tel:+918789297252" class="floating-btn call">
  <i class="fa-solid fa-phone"></i>
</a>

<div id="ai-btn">🤖</div>
<div id="ai-box">
  <div id="chat"></div>
  <div class="input-wrapper">
    <input id="msg" placeholder="Ask Kittu AI..." />
    <button onclick="askAI()">Send</button>
  </div>
</div>

<script>
  (function() {
    emailjs.init("45l2Q4UQfHwjqu3lb");
  })();

  document.getElementById("contact-form").addEventListener("submit", function(e) {
    e.preventDefault();
    emailjs.sendForm(
      "service_j7bru09",
      "template_5ahgl16",
      this
    )
    .then(() => {
      alert("Message sent successfully!");
      this.reset();
    })
    .catch((error) => {
      console.log(error);
      alert("Failed to send message!");
    });
  });

  const AI_BTN = document.getElementById("ai-btn");
  const AI_BOX = document.getElementById("ai-box");
  const CHAT_DIV = document.getElementById("chat");
  const MSG_INPUT = document.getElementById("msg");

  AI_BTN.onclick = () => {
    AI_BOX.style.display = AI_BOX.style.display === "flex" ? "none" : "flex";
    if (AI_BOX.style.display === "flex" && CHAT_DIV.children.length === 0) {
      addMsgToChat("👋 I'm Kittu AI. Need help with the contact form or anything else?", "ai");
    }
  };

  function addMsgToChat(text, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${sender}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;
    const timeSpan = document.createElement("div");
    timeSpan.className = "timestamp";
    timeSpan.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
    msgDiv.appendChild(bubble);
    msgDiv.appendChild(timeSpan);
    CHAT_DIV.appendChild(msgDiv);
    CHAT_DIV.scrollTop = CHAT_DIV.scrollHeight;
  }

  let thinkingEl = null;
  function showThinking() {
    if (thinkingEl) thinkingEl.remove();
    thinkingEl = document.createElement("div");
    thinkingEl.className = "message ai";
    thinkingEl.id = "typingAnim";
    thinkingEl.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span> thinking...</div></div>`;
    CHAT_DIV.appendChild(thinkingEl);
    CHAT_DIV.scrollTop = CHAT_DIV.scrollHeight;
  }
  function hideThinking() {
    if (thinkingEl) thinkingEl.remove();
    thinkingEl = null;
  }

  async function askAI() {
    const msg = MSG_INPUT.value.trim();
    if (!msg) return;
    addMsgToChat(msg, "user");
    MSG_INPUT.value = "";
    MSG_INPUT.disabled = true;
    showThinking();
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 45000);
      const res = await fetch("http://localhost:5000/api/ask-ai", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg }),
        signal: controller.signal
      });
      clearTimeout(timeout);
      const data = await res.json();
      hideThinking();
      addMsgToChat(data.reply || "No response from AI.", "ai");
    } catch (err) {
      hideThinking();
      addMsgToChat("❌ Cannot reach backend. Please start python ai_backend.py", "ai");
    } finally {
      MSG_INPUT.disabled = false;
      MSG_INPUT.focus();
    }
  }

  MSG_INPUT.addEventListener("keypress", (e) => {
    if (e.key === "Enter") askAI();
  });
  window.addEventListener("click", (e) => {
    if (!AI_BOX.contains(e.target) && e.target !== AI_BTN && AI_BOX.style.display === "flex") {
      AI_BOX.style.display = "none";
    }
  });
</script>
</body>
</html>
